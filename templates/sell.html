{% extends 'base.html' %}

{% block content %}
<div class="form-container glass">
    <h2>Sell Medicine</h2>
    <form action="{{ url_for('sell') }}" method="POST">
        <div class="form-group">
            <label for="medicine_id">Select Medicine</label>
            <select id="medicine_id" name="medicine_id" required>
                <option value="" disabled selected>Select a medicine...</option>
                {% for m in medicines %}
                <option value="{{ m.id }}">{{ m.name }} - {{ m.brand }} (Stock: {{ m.stock }}, Price: ${{
                    "%.2f"|format(m.price) }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" required min="1">
        </div>

        <button type="submit" class="btn btn-primary">Complete Sale</button>
    </form>
</div>
{% endblock %}
