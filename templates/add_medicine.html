{% extends 'base.html' %}

{% block content %}
<div class="form-container glass">
    <h2>Add New Medicine</h2>
    <form action="{{ url_for('add_medicine') }}" method="POST">
        <div class="form-group">
            <label for="name">Medicine Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Paracetamol 500mg">
        </div>

        <div class="form-group">
            <label for="brand">Brand</label>
            <input type="text" id="brand" name="brand" placeholder="e.g. Generic">
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. Analgesic">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" step="0.01" id="price" name="price" required>
            </div>

            <div class="form-group">
                <label for="stock">Initial Stock</label>
                <input type="number" id="stock" name="stock" required>
            </div>
        </div>

        <div class="form-group">
            <label for="expiry">Expiry Date</label>
            <input type="date" id="expiry" name="expiry" required>
        </div>

        <button type="submit" class="btn btn-primary">Add Medicine</button>
    </form>
</div>
{% endblock %}
